<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-blue-700 text-white min-h-screen">

<nav class="bg-blue-800/90 backdrop-blur-lg shadow-lg border-b border-blue-200 mb-12">
    <div class="container mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">
            Product Detail
        </h1>
        <a href="/products"
           class="text-amber-100 hover:text-white font-medium transition duration-300">
            Back
        </a>
    </div>
</nav>

<div class="container mx-auto px-6 py-20">
    <div class="max-w-2xl mx-auto bg-white
                p-12 rounded-3xl shadow-2xl
                border-l-8 border-blue-700">

        <h1 class="text-4xl font-extrabold text-blue-800 mb-8"
            th:text="${product.name}">
        </h1>

        <p class="mb-4 text-gray-500 text-lg">
            Category:
            <span class="text-blue-700 font-semibold ml-2"
                  th:text="${product.category}"></span>
        </p>

        <p class="text-4xl font-bold text-blue-900 mb-10"
           th:text="${product.price}">
        </p>

        <p class="mb-10 text-lg">
            <span class="text-gray-500">Stock:</span>
            <span class="font-bold text-blue-800 text-2xl ml-2"
                  th:text="${product.stock}">
            </span>
        </p>

        <a href="/products"
           class="bg-amber-50 hover:bg-amber-100
                  text-blue-800 font-bold
                  px-8 py-3 rounded-xl shadow-lg
                  hover:scale-105 transform transition duration-300">
            Back to List
        </a>

    </div>
</div>

</body>
</html>
