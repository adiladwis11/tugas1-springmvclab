<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-blue-700 text-white min-h-screen">

<nav class="bg-blue-800/90 backdrop-blur-lg shadow-lg border-b border-blue-200 mb-12">
    <div class="container mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">
            🦋 Products
        </h1>
        <a href="/" class="text-amber-100 hover:text-white font-medium transition duration-300">
            <- Home
        </a>
    </div>
</nav>

<div class="container mx-auto px-6 pb-20 space-y-8">

    <div th:each="product : ${products}"
         class="bg-white rounded-3xl shadow-2xl p-8
                hover:shadow-[0_20px_60px_rgba(0,0,0,0.4)]
                hover:scale-[1.02] transform transition duration-300">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">

            <!-- LEFT CONTENT -->
            <div>
                <h3 class="text-2xl font-bold text-blue-800 mb-2"
                    th:text="${product.name}">
                </h3>

                <span class="inline-block bg-blue-100 text-blue-800
                             text-sm px-4 py-1 rounded-full font-semibold">
                    <span th:text="${product.category}"></span>
                </span>

                <p class="text-3xl font-extrabold text-blue-900 mt-4"
                   th:text="${product.price}">
                </p>
            </div>

            <!-- RIGHT BUTTON -->
            <div>
                <a th:href="@{/products/{id}(id=${product.id})}"
                   class="inline-block bg-amber-50
                          hover:bg-amber-100
                          text-blue-800 font-bold px-8 py-3
                          rounded-xl shadow-lg
                          hover:scale-105 transform transition duration-300">
                    View Detail →
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
