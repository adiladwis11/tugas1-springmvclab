<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-blue-700 text-white min-h-screen">

<!-- NAVIGATION -->
<nav class="bg-blue-800/90 backdrop-blur-lg shadow-lg border-b border-blue-200 mb-16">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">
            Greeting
        </h1>
        <a th:href="@{/}"
           class="text-amber-100 hover:text-white font-medium transition duration-300">
            Home
        </a>
    </div>
</nav>

<div class="max-w-3xl mx-auto mt-20 px-6 text-center">

    <div class="bg-white rounded-3xl shadow-2xl p-12 border-l-8 border-blue-700">

        <h1 th:text="${greeting}"
            class="text-4xl md:text-5xl font-extrabold text-blue-800">
            Greeting
        </h1>

        <a th:href="@{/}"
           class="inline-block mt-10 bg-amber-50 hover:bg-amber-100
                  text-blue-800 font-bold px-8 py-3 rounded-xl
                  shadow-lg hover:scale-105 transform transition duration-300">
            Home
        </a>

    </div>

</div>

</body>
</html>
