<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-blue-700 text-white min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-28 text-center">

    <div class="bg-white rounded-3xl shadow-2xl p-16 border-l-8 border-blue-700 inline-block">

        <h2 class="text-5xl font-extrabold mb-6 text-blue-800">

        </h2>

        <p class="text-gray-600 mb-10 text-lg">

        </p>

        <a th:href="@{/products}"

<div th:replace="~{fragments/layout :: footer}"></div>
